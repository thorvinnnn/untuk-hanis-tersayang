<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Untuk Hanis 🎁</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:  #ff85a1;
      --light: #ffd6e8;
      --soft:  #fff0f5;
      --teks:  #7a3b52;
      --emas:  #d4a0b0;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Nunito',sans-serif;
      background:linear-gradient(135deg,#fff0f5 0%,#ffe4ef 50%,#ffd6e8 100%);
      min-height:100vh; overflow-x:hidden; color:var(--teks);
    }

    /* ── INTRO ── */
    #intro {
      position:fixed; inset:0; z-index:100;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:8px;
      background:linear-gradient(135deg,#fff0f5,#ffd6e8);
      transition:opacity 0.9s ease, visibility 0.9s ease;
    }
    #intro.hide { opacity:0; visibility:hidden; pointer-events:none; }

    .intro-hint {
      font-size:13px; letter-spacing:3px; text-transform:uppercase;
      color:var(--emas); margin-bottom:16px;
      animation:fadeHint 1.8s ease-in-out infinite alternate;
    }
    @keyframes fadeHint { from{opacity:0.3} to{opacity:1} }

    #gift-emoji {
      font-size:100px; cursor:pointer; user-select:none;
      animation:giftBounce 1.3s ease-in-out infinite;
      filter:drop-shadow(0 10px 28px rgba(255,133,161,0.45));
      margin-bottom:28px; display:block;
      transition:transform 0.2s;
    }
    @keyframes giftBounce {
      0%,100%{ transform:translateY(0) rotate(-4deg) scale(1); }
      50%    { transform:translateY(-18px) rotate(4deg) scale(1.06); }
    }

    #pencet-btn {
      font-family:'Dancing Script',cursive; font-size:30px;
      color:white;
      background:linear-gradient(135deg,#ff85a1,#ff4f82);
      border:none; border-radius:50px;
      padding:16px 56px; cursor:pointer;
      box-shadow:0 8px 36px rgba(255,133,161,0.5);
      transition:transform 0.15s, box-shadow 0.15s;
    }
    #pencet-btn:hover:not(:disabled) {
      transform:scale(1.08);
      box-shadow:0 14px 44px rgba(255,133,161,0.6);
    }
    #pencet-btn:active:not(:disabled) { transform:scale(0.95); }
    #pencet-btn:disabled { cursor:default; }

    .intro-sub { font-size:13px; color:var(--emas); margin-top:10px; }

    /* ── CANVAS ── */
    #burst-canvas {
      position:fixed; inset:0; z-index:200; pointer-events:none;
    }

    /* ── MUSIK BAR ── */
    #musik-bar {
      position:fixed; top:18px; right:18px; z-index:50;
      display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,0.78);
      backdrop-filter:blur(12px);
      border:1.5px solid #ffb6c1; border-radius:50px;
      padding:8px 16px;
      box-shadow:0 4px 20px rgba(255,133,161,0.2);
      opacity:0; transition:opacity 0.8s ease;
    }
    #musik-bar.show { opacity:1; }
    #musik-bar span { font-size:13px; color:var(--pink); font-weight:700; }
    #play-btn {
      background:var(--pink); border:none; border-radius:50%;
      width:32px; height:32px; cursor:pointer; font-size:14px;
      display:flex; align-items:center; justify-content:center;
      color:white; transition:transform 0.2s;
    }
    #play-btn:hover { transform:scale(1.15); }
    audio { display:none; }

    /* ── PARTIKEL ── */
    #particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .particle {
      position:absolute; animation:floatUp linear infinite;
      user-select:none; pointer-events:none; opacity:0;
    }
    @keyframes floatUp {
      0%   { transform:translateY(110vh) rotate(0deg); opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:0.7; }
      100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
    }

    /* ── MAIN ── */
    main {
      position:relative; z-index:1;
      display:flex; flex-direction:column;
      align-items:center; padding:60px 20px 100px; gap:50px;
      opacity:0; transform:translateY(36px);
      transition:opacity 1s ease 0.2s, transform 1s ease 0.2s;
    }
    main.show { opacity:1; transform:translateY(0); }

    /* HERO */
    .hero { text-align:center; }
    .hero .tanggal {
      font-size:13px; letter-spacing:4px; text-transform:uppercase;
      color:var(--emas); margin-bottom:12px;
    }
    .hero h1 {
      font-family:'Dancing Script',cursive;
      font-size:clamp(50px,10vw,88px); line-height:1.1;
      color:var(--pink); text-shadow:0 4px 20px rgba(255,133,161,0.3);
    }
    .hero .nama-pacar {
      font-family:'Dancing Script',cursive;
      font-size:clamp(36px,7vw,66px);
      color:var(--teks); display:block; margin-top:4px;
    }
    .hero .emoji-kue {
      font-size:62px; display:block; margin-top:20px;
      animation:bounce 1.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100%{ transform:translateY(0); }
      50%    { transform:translateY(-14px); }
    }

    /* CARD */
    .card {
      background:rgba(255,255,255,0.72); backdrop-filter:blur(16px);
      border:1.5px solid rgba(255,182,193,0.6); border-radius:28px;
      padding:36px 40px; max-width:680px; width:100%;
      box-shadow:0 8px 40px rgba(255,133,161,0.15),
                 0 2px 0 rgba(255,255,255,0.8) inset;
    }

    /* SURAT */
    .surat-section h2 {
      font-family:'Dancing Script',cursive; font-size:28px;
      color:var(--pink); margin-bottom:20px;
      display:flex; align-items:center; gap:10px;
    }
    .surat-body {
      background:linear-gradient(180deg,rgba(255,214,224,0.3),transparent);
      border-left:3px solid var(--pink); border-radius:0 12px 12px 0;
      padding:20px 24px; font-size:16px; line-height:1.9;
      color:var(--teks); white-space:pre-line;
    }
    .surat-ttd {
      text-align:right; font-family:'Dancing Script',cursive;
      font-size:24px; color:var(--pink); margin-top:24px;
    }
    .sparkle-wrap { position:relative; display:inline-block; }
    .sparkle-wrap::before,.sparkle-wrap::after {
      content:'✨'; position:absolute; top:-10px; font-size:20px;
      animation:sparkle 2s ease-in-out infinite;
    }
    .sparkle-wrap::before { left:-24px; }
    .sparkle-wrap::after  { right:-24px; animation-delay:1s; }
    @keyframes sparkle {
      0%,100%{ opacity:1; transform:scale(1) rotate(0deg); }
      50%    { opacity:0.4; transform:scale(1.3) rotate(20deg); }
    }

    /* ALASAN */
    .alasan-section h2 {
      font-family:'Dancing Script',cursive; font-size:28px;
      color:var(--pink); text-align:center; margin-bottom:24px;
    }
    .alasan-grid {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px;
    }
    .alasan-item {
      background:linear-gradient(135deg,rgba(255,133,161,0.12),rgba(255,214,224,0.25));
      border:1px solid rgba(255,182,193,0.5); border-radius:18px;
      padding:20px 16px; text-align:center; font-size:14px;
      color:var(--teks); transition:transform 0.2s,box-shadow 0.2s; cursor:default;
    }
    .alasan-item:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(255,133,161,0.2); }
    .alasan-item .ikon { font-size:30px; margin-bottom:10px; display:block; }
    .alasan-item strong { font-size:13px; font-weight:700; color:var(--pink); display:block; margin-bottom:4px; }

    /* PENUTUP */
    .penutup {
      text-align:center; font-family:'Dancing Script',cursive;
      font-size:38px; color:var(--pink);
      text-shadow:0 4px 16px rgba(255,133,161,0.25);
      animation:pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ transform:scale(1); }
      50%    { transform:scale(1.05); }
    }

    @media(max-width:500px){
      .card{ padding:24px 18px; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     ✏️  KONFIGURASI — EDIT DI SINI
============================================================ -->
<script>
  const NAMA = "Hanis Sayekti";

  // Link MP3 online, atau nama file lokal misalnya "lagu.mp3"
  const MUSIK_URL = "beautiful.mp3";

  const PESAN = `Hei kamu hanis pacarku yang paling aku sayangggg,

Selamat ulang tahun ya sayangkuu! 🎂

Di hari yang spesial ini, aku ingin kamu tahu betapa berharganya kamu bagiku. Setiap momen bersamamu adalah hal yang berharga bagiku, terimakasih untuk hadirmu, sayang mu, sabarmu untukku.

Semoga di usiamu yang ke 20 ini, kamu selalu diberikan kebahagiaan, kesehatan, dan semua hal yang kamu impikan. Aku akan selalu ada di sisimu — mendukung, menemani, dan mencintaimu.

Terima kasih sudah menjadi bagian terindah dalam hidupku. 💕`;

  const ALASAN = [
    { ikon:"😊", judul:"Senyummu",          desc:"Satu senyummu bisa bikin hatiku langsung hangat" },
    { ikon:"💬", judul:"Caramu Bicara",     desc:"Aku suka mendengar ceritamu, berjam-jam pun tak cukup" },
    { ikon:"💪", judul:"Kekuatanmu",        desc:"Kamu kuat bahkan saat tak ada yang melihat" },
    { ikon:"🌸", judul:"Kelembutan Hatimu", desc:"Hatimu sebaik bunga yang mekar di musim semi" },
    { ikon:"🌙", judul:"Malam Bersamamu",   desc:"Ngobrol tengah malam denganmu adalah favoritku" },
    { ikon:"✨", judul:"Caramu Tumbuh",     desc:"Aku bangga melihatmu jadi versi terbaik dirimu" },
  ];
</script>

<!-- INTRO SCREEN -->
<div id="intro">
  <p class="intro-hint">ada sesuatu untukmu ✨</p>
  <span id="gift-emoji">🎁</span>
  <button id="pencet-btn" onclick="mulaiSurprise()">Pencet Aku! 🎉</button>
  <p class="intro-sub">klik untuk membuka kejutan</p>
</div>

<!-- CONFETTI CANVAS -->
<canvas id="burst-canvas"></canvas>

<!-- MUSIK -->
<div id="musik-bar">
  <button id="play-btn">▶</button>
  <span>🎵 Lagu untukmu</span>
</div>
<audio id="audio" loop></audio>

<!-- PARTIKEL -->
<div id="particles"></div>

<!-- KONTEN UTAMA -->
<main id="main-content">
  <div class="hero">
    <div class="tanggal" id="tgl-display"></div>
    <h1>Happy Birthday,<br><span class="nama-pacar" id="nama-display"></span></h1>
    <span class="emoji-kue">🎂</span>
  </div>

  <div class="card surat-section">
    <h2><span class="sparkle-wrap">💌 Surat Cinta Untukmu</span></h2>
    <div class="surat-body" id="surat-body"></div>
    <div class="surat-ttd">— dari yang selalu mencintaimu 💕</div>
  </div>

  <div class="card alasan-section">
    <h2>Alasan Aku Mencintaimu</h2>
    <div class="alasan-grid" id="alasan-grid"></div>
  </div>

  <div class="penutup">Happy Birthday, I Love You Soo muchhh 💖</div>
</main>

<script>
  // ── INJECT ──
  document.title = `Happy Birthday, ${NAMA} 🎂`;
  document.getElementById('nama-display').textContent = NAMA;
  document.getElementById('surat-body').textContent   = PESAN;
  document.getElementById('audio').src               = MUSIK_URL;
  const now = new Date();
  document.getElementById('tgl-display').textContent =
    now.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  ALASAN.forEach(a => {
    document.getElementById('alasan-grid').innerHTML +=
      `<div class="alasan-item">
         <span class="ikon">${a.ikon}</span>
         <strong>${a.judul}</strong>${a.desc}
       </div>`;
  });

  // ── MUSIK ──
  const audio   = document.getElementById('audio');
  const playBtn = document.getElementById('play-btn');
  let playing   = false;
  playBtn.addEventListener('click', () => {
    playing ? (audio.pause(), playBtn.textContent='▶')
            : (audio.play(),  playBtn.textContent='⏸');
    playing = !playing;
  });

  // ── PARTIKEL ──
  const pCont  = document.getElementById('particles');
  const emojis = ['❤️','🌸','💕','🌺','✨','💖','🌷','💝','🦋','🌼'];
  function createParticle() {
    const el = document.createElement('span');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const sz = 14 + Math.random()*22;
    el.style.cssText = `left:${Math.random()*100}%;font-size:${sz}px;
      animation-duration:${7+Math.random()*10}s;animation-delay:${Math.random()*5}s;`;
    pCont.appendChild(el);
    setTimeout(() => el.remove(), 18000);
  }

  // ── CONFETTI ──
  const canvas = document.getElementById('burst-canvas');
  const ctx    = canvas.getContext('2d');
  let pieces   = [];

  function resize() { canvas.width=innerWidth; canvas.height=innerHeight; }
  resize(); window.addEventListener('resize', resize);

  const COLORS = ['#ff85a1','#ffb6c1','#ff4f82','#ffa0c0','#ff3d7f','#ffcce0','#ff8fab','#ffd6e8'];
  const EMJ    = ['❤️','🌸','💖','✨','🎊','🎉','🌷','💕','🎈','🌺'];

  function spawnBurst(cx, cy) {
    for (let i = 0; i < 140; i++) {
      const angle  = Math.random() * Math.PI * 2;
      const speed  = 3 + Math.random() * 15;
      const isEmj  = Math.random() < 0.3;
      pieces.push({
        x:cx, y:cy,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - Math.random()*5,
        sz: isEmj ? 20+Math.random()*18 : 5+Math.random()*9,
        color: COLORS[Math.floor(Math.random()*COLORS.length)],
        emoji: isEmj ? EMJ[Math.floor(Math.random()*EMJ.length)] : null,
        rot: Math.random()*360, rotV: (Math.random()-.5)*9,
        grav: 0.28+Math.random()*0.22,
        alpha:1,
        shape:['rect','circle','star'][Math.floor(Math.random()*3)],
      });
    }
    requestAnimationFrame(drawBurst);
  }

  function star(cx,cy,r) {
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a1=(i*4*Math.PI/5)-Math.PI/2;
      const a2=(i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2;
      ctx.lineTo(cx+r*Math.cos(a1),cy+r*Math.sin(a1));
      ctx.lineTo(cx+r*.4*Math.cos(a2),cy+r*.4*Math.sin(a2));
    }
    ctx.closePath(); ctx.fill();
  }

  function drawBurst() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces = pieces.filter(p=>p.alpha>0.03);
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav; p.vx*=.99;
      p.rot+=p.rotV; p.alpha-=0.011;
      ctx.save();
      ctx.globalAlpha=Math.max(0,p.alpha);
      ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      if(p.emoji){
        ctx.font=`${p.sz}px serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(p.emoji,0,0);
      } else {
        ctx.fillStyle=p.color;
        if(p.shape==='rect')      ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);
        else if(p.shape==='circle'){ ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill(); }
        else star(0,0,p.sz/2);
      }
      ctx.restore();
    });
    if(pieces.length>0) requestAnimationFrame(drawBurst);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }

  // ── SURPRISE FLOW ──
  function mulaiSurprise() {
    const btn   = document.getElementById('pencet-btn');
    const gift  = document.getElementById('gift-emoji');
    const intro = document.getElementById('intro');

    btn.disabled = true;

    // Goyangkan hadiah
    gift.style.animation = 'none';
    gift.style.transition = 'transform 0.1s';
    let shakes = 0;
    const shakeDir = [1,-1,1,-1,1,-1,0];
    const shakeInterval = setInterval(()=>{
      gift.style.transform = `rotate(${shakeDir[shakes]*12}deg) scale(1.15)`;
      shakes++;
      if(shakes>=shakeDir.length){
        clearInterval(shakeInterval);
        gift.textContent = '🎊';
        gift.style.transform = 'scale(1.4)';
        btn.textContent = '🎉🎉🎉';

        // BOOM!
        setTimeout(()=>{
          spawnBurst(innerWidth/2, innerHeight/2);

          setTimeout(()=>{
            intro.classList.add('hide');
            setTimeout(()=>{
              document.getElementById('main-content').classList.add('show');
              document.getElementById('musik-bar').classList.add('show');
              // partikel
              for(let i=0;i<20;i++) setTimeout(createParticle,i*300);
              setInterval(createParticle,900);
              // musik otomatis
              audio.play().then(()=>{ playBtn.textContent='⏸'; playing=true; }).catch(()=>{});
            },300);
          },700);
        },250);
      }
    },70);
  }
</script>
</body>
</html>
